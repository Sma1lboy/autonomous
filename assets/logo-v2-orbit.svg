<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="url(#bg2)" />

  <!-- Orbit rings — 3 layers (conductor, master, worker) -->
  <ellipse cx="200" cy="180" rx="120" ry="45" fill="none" stroke="url(#ring1)" stroke-width="1.5" transform="rotate(-20 200 180)" opacity="0.7"/>
  <ellipse cx="200" cy="180" rx="85" ry="32" fill="none" stroke="url(#ring2)" stroke-width="1.5" transform="rotate(15 200 180)" opacity="0.7"/>
  <ellipse cx="200" cy="180" rx="50" ry="20" fill="none" stroke="#a78bfa" stroke-width="1" transform="rotate(-5 200 180)" opacity="0.4"/>

  <!-- Center node — the autonomous core -->
  <circle cx="200" cy="180" r="18" fill="url(#accent)" opacity="0.9"/>
  <circle cx="200" cy="180" r="10" fill="#09090b"/>
  <circle cx="200" cy="180" r="5" fill="url(#accent)"/>

  <!-- Orbiting agents -->
  <!-- Conductor (outer) -->
  <circle cx="320" cy="168" r="7" fill="#8b5cf6" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 200 180" to="360 200 180" dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Sprint Master (middle) -->
  <circle cx="285" cy="190" r="5.5" fill="#06b6d4" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="120 200 180" to="480 200 180" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Worker (inner) -->
  <circle cx="250" cy="178" r="4" fill="#a78bfa" opacity="0.75">
    <animateTransform attributeName="transform" type="rotate" from="240 200 180" to="600 200 180" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse effect on center -->
  <circle cx="200" cy="180" r="18" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="18;35;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Text -->
  <text x="200" y="268" text-anchor="middle" fill="#fafafa" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">
    autonomous
  </text>
  <text x="200" y="296" text-anchor="middle" fill="#71717a" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" font-weight="400" letter-spacing="3">
    SKILL
  </text>

  <!-- Tagline -->
  <text x="200" y="345" text-anchor="middle" fill="#52525b" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2">
    self-driving project agent
  </text>
</svg>
