<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="#09090b" />

  <!-- The "A" mark — stylized as an upward arrow/agent with a continuous loop at base -->
  <g transform="translate(200, 155)" fill="none" stroke="url(#grad4)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upward chevron / agent arrow -->
    <path d="M -40,25 L 0,-30 L 40,25"/>
    <!-- Horizontal bar (the "A" crossbar) -->
    <line x1="-22" y1="5" x2="22" y2="5"/>
    <!-- Loop at base — continuous/autonomous -->
    <path d="M -40,25 C -40,55 -10,55 0,40 C 10,55 40,55 40,25" />
  </g>

  <!-- Spinning dots around the A -->
  <circle r="3" fill="#8b5cf6" opacity="0.8">
    <animateMotion dur="6s" repeatCount="indefinite" path="M 200,120 C 250,120 255,200 200,210 C 145,200 150,120 200,120"/>
  </circle>
  <circle r="2.5" fill="#06b6d4" opacity="0.6">
    <animateMotion dur="6s" repeatCount="indefinite" begin="2s" path="M 200,120 C 250,120 255,200 200,210 C 145,200 150,120 200,120"/>
  </circle>

  <!-- Text -->
  <text x="200" y="265" text-anchor="middle" fill="#fafafa" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">
    autonomous
  </text>
  <text x="200" y="293" text-anchor="middle" fill="#71717a" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" font-weight="400" letter-spacing="3">
    SKILL
  </text>

  <!-- Tagline -->
  <text x="200" y="342" text-anchor="middle" fill="#52525b" font-family="Inter, -apple-system, sans-serif" font-size="11" letter-spacing="2">
    sense . direct . respond . repeat
  </text>
</svg>
